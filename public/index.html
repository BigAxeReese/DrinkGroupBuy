<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BGB Payments</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f7f5;
        color: #1f2933;
      }

      main {
        width: min(720px, calc(100vw - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 20px;
        color: #52606d;
        line-height: 1.6;
      }

      code {
        display: inline-block;
        padding: 3px 7px;
        border-radius: 6px;
        background: #e4e7eb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BGB Payments</h1>
      <p>金流串接基礎架構已啟動。建立付款請求使用 <code>POST /api/checkout</code>，接收金流商通知使用 <code>POST /payments/{provider}/webhook</code>。</p>
      <p id="status">Checking API status...</p>
    </main>
    <script>
      fetch("/health")
        .then((response) => response.json())
        .then((data) => {
          document.querySelector("#status").textContent = `API status: ${data.status}`;
        })
        .catch(() => {
          document.querySelector("#status").textContent = "API status: unavailable";
        });
    </script>
  </body>
</html>
