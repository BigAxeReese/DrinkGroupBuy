<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DrinkGroupBuy</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="phone-frame">
      <div class="phone-camera" aria-hidden="true"></div>
      <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">DrinkGroupBuy</p>
          <h1 id="pageTitle">主頁</h1>
        </div>
        <button class="icon-button" id="refreshButton" type="button" title="重新整理">↻</button>
      </header>

      <div class="role-switcher" aria-label="身分切換">
        <button class="role-button" type="button" data-role-target="merchant">商家</button>
        <button class="role-button is-active" type="button" data-role-target="customer">顧客</button>
      </div>

      <label class="merchant-account merchant-only" id="merchantAccountPanel">
        <span>模擬商家帳號</span>
        <select id="merchantAccountSelect" aria-label="選擇模擬商家帳號"></select>
      </label>

      <label class="customer-account customer-only" id="customerAccountPanel">
        <span>模擬顧客帳號</span>
        <select id="customerAccountSelect" aria-label="選擇模擬顧客帳號">
          <option value="test1">test1</option>
          <option value="test2">test2</option>
          <option value="test3">test3</option>
        </select>
      </label>

      <section class="view" id="homeView">
        <div class="feature-grid">
          <button class="feature-card merchant-only" type="button" data-view-target="create">
            <span>01</span>
            <strong>建立團購</strong>
          </button>
          <button class="feature-card" type="button" data-view-target="groups">
            <span>01</span>
            <strong>團購列表</strong>
          </button>
          <button class="feature-card customer-only" type="button" data-view-target="join">
            <span>02</span>
            <strong>加入團購</strong>
          </button>
          <button class="feature-card customer-only" type="button" data-view-target="orders">
            <span>03</span>
            <strong>我的訂單</strong>
          </button>
          <button class="feature-card customer-only is-disabled" type="button" disabled>
            <span>04</span>
            <strong>附近店家</strong>
          </button>
          <button class="feature-card merchant-only is-disabled" type="button" disabled>
            <span>03</span>
            <strong>訂單管理</strong>
          </button>
        </div>
      </section>

      <section class="view" id="createView" hidden>
      <button class="back-button view-back-button" type="button" data-view-target="home">‹ 返回主頁</button>
      <section class="panel" id="createPanel">
        <form id="groupBuyForm" class="form">
          <label>
            <span>團購名稱</span>
            <input id="titleInput" name="title" type="text" placeholder="未填寫時預設為飲料團購">
          </label>

          <label>
            <span>活動店家</span>
            <input id="selectedShopName" type="text" readonly>
            <input id="shopSelect" name="shopId" type="hidden">
          </label>

          <div class="promotion-editor">
            <div class="inline-heading">
              <span>優惠方案</span>
              <button class="secondary-button" id="addPromotionButton" type="button">新增方案</button>
            </div>
            <div class="promotion-list" id="promotionList"></div>
          </div>

          <label>
            <span>建立者</span>
            <input id="createdByInput" name="createdBy" type="text" value="google_user_demo" required>
          </label>

          <label>
            <span>截止時間</span>
            <input id="deadlineInput" name="deadline" type="datetime-local" required>
          </label>

          <label>
            <span>備註</span>
            <textarea id="noteInput" name="note" rows="3" placeholder="可填付款方式、取餐時間或其他提醒"></textarea>
          </label>

          <button class="primary-button" type="submit">建立團購</button>
          <p class="message" id="formMessage" role="status"></p>
        </form>
      </section>
      </section>

      <section class="view customer-only" id="joinView" hidden>
        <button class="back-button view-back-button" type="button" data-view-target="home">‹ 返回主頁</button>

        <section class="panel" id="joinCampaignPanel">
          <div class="section-heading">
            <p class="eyebrow">加入團購</p>
            <h2>選擇進行中的團購</h2>
          </div>
          <div class="group-list" id="joinCampaignList"></div>
        </section>

        <section class="panel" id="joinOrderPanel" hidden>
          <button class="back-button" id="backToJoinCampaignButton" type="button">‹ 返回選擇團購</button>
          <div class="section-heading">
            <p class="eyebrow" id="joinShopName">店家</p>
            <h2 id="joinGroupTitle">選擇飲品</h2>
          </div>
          <div class="drink-grid" id="drinkMenuList"></div>

          <div class="modal-backdrop" id="customizationModal" hidden>
            <section class="customization-modal" role="dialog" aria-modal="true" aria-labelledby="customizationTitle">
              <div class="modal-header">
                <h2 id="customizationTitle">客製化飲品</h2>
                <button class="modal-close" id="closeCustomizationButton" type="button" aria-label="關閉">×</button>
              </div>
              <form class="join-form" id="joinForm">
                <div class="selected-drink">
                  <span id="selectedDrinkName">已選飲品</span>
                  <strong id="selectedDrinkPrice">$0</strong>
                </div>
                <label>
                  <span>甜度</span>
                  <select id="sugarSelect" required>
                    <option value="無糖">無糖</option>
                    <option value="微糖">微糖</option>
                    <option value="半糖" selected>半糖</option>
                    <option value="少糖">少糖</option>
                    <option value="正常糖">正常糖</option>
                  </select>
                </label>
                <label>
                  <span>冰塊</span>
                  <select id="iceSelect" required>
                    <option value="去冰">去冰</option>
                    <option value="微冰" selected>微冰</option>
                    <option value="少冰">少冰</option>
                    <option value="正常冰">正常冰</option>
                    <option value="熱飲">熱飲</option>
                  </select>
                </label>
                <label>
                  <span>杯數</span>
                  <input id="quantityInput" type="number" min="1" step="1" value="1" inputmode="numeric" required>
                </label>
                <label>
                  <span>備註</span>
                  <textarea id="orderNoteInput" rows="3" placeholder="例如：請標示姓名、分開裝袋"></textarea>
                </label>
                <div class="order-preview">
                  <span>小計</span>
                  <strong id="orderSubtotal">$0</strong>
                </div>
                <button class="primary-button" type="submit">加入這筆團購</button>
                <p class="message" id="joinMessage" role="status"></p>
              </form>
            </section>
          </div>
        </section>
      </section>

      <section class="view customer-only" id="ordersView" hidden>
        <button class="back-button view-back-button" type="button" data-view-target="home">‹ 返回主頁</button>

        <section class="customer-order-list" id="customerOrderList"></section>
      </section>

      <section class="view" id="groupsView" hidden>
      <button class="back-button view-back-button" type="button" data-view-target="home">‹ 返回主頁</button>
      <section class="panel group-panel" id="groupBuyPanel" hidden>
        <button class="back-button" id="backToGroupListButton" type="button">‹ 返回團購列表</button>
        <div class="section-heading">
          <p class="eyebrow">目前團購</p>
          <h2 id="groupTitle">尚未建立</h2>
        </div>

        <dl class="summary-list">
          <div>
            <dt>店家</dt>
            <dd id="groupShop">-</dd>
          </div>
          <div>
            <dt>優惠</dt>
            <dd id="groupPromotion">-</dd>
          </div>
          <div>
            <dt>截止</dt>
            <dd id="groupDeadline">-</dd>
          </div>
          <div>
            <dt>狀態</dt>
            <dd id="groupStatus">-</dd>
          </div>
        </dl>

        <div class="cancelled-notice" id="cancelledNotice" hidden>
          <strong>此團購已取消</strong>
          <p id="cancelledReason"></p>
        </div>

        <div class="progress-block">
          <div class="progress-header">
            <span id="progressLabel">0 / 0</span>
            <strong id="discountLabel">尚未達標</strong>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="totals-grid">
          <div>
            <span>杯數</span>
            <strong id="totalCups">0</strong>
          </div>
          <div>
            <span>金額</span>
            <strong id="totalAmount">$0</strong>
          </div>
          <div>
            <span>人數</span>
            <strong id="totalParticipants">0</strong>
          </div>
        </div>

        <p class="note-text" id="groupNote"></p>

        <div class="detail-join-panel customer-only" id="detailJoinPanel">
          <button class="primary-button full-button" id="joinFromDetailButton" type="button">加入團購</button>
        </div>

        <div class="test-panel merchant-only" id="testPanel">
          <div class="section-heading compact-heading">
            <p class="eyebrow">測試工具</p>
            <h2>模擬團購截止</h2>
          </div>
          <p class="action-copy">將截止時間立即設為現在，用來測試接單與完成訂單流程。</p>
          <button class="secondary-button full-button" id="simulateDeadlineButton" type="button">模擬時間到</button>
          <p class="message" id="simulateDeadlineMessage" role="status"></p>
        </div>

        <div class="complete-panel merchant-only" id="completePanel">
          <div class="section-heading compact-heading">
            <p class="eyebrow">接單作業</p>
            <h2>完成訂單</h2>
          </div>
          <p class="action-copy">團購截止後可確認本次訂單已完成，完成後將歸入歷史訂單。</p>
          <button class="primary-button" id="completeOrderButton" type="button">完成訂單</button>
          <p class="message" id="completeMessage" role="status"></p>
        </div>

        <div class="cancel-panel merchant-only" id="cancelPanel">
          <div class="section-heading compact-heading">
            <p class="eyebrow">商家操作</p>
            <h2>取消團購</h2>
          </div>
          <form class="cancel-form" id="cancelForm">
            <label>
              <span>取消原因</span>
              <textarea id="cancelReasonInput" rows="3" placeholder="例如：原料不足、臨時店休或未達開團條件" required></textarea>
            </label>
            <button class="danger-button" type="submit">確認取消團購</button>
            <p class="message" id="cancelMessage" role="status"></p>
          </form>
        </div>

        <div class="participants-block">
          <div class="section-heading compact-heading">
            <p class="eyebrow">參與明細</p>
            <h2>目前訂單</h2>
          </div>
          <div class="participant-list" id="participantList"></div>
          <p class="message" id="participantMessage" role="status"></p>
        </div>
      </section>

      <section class="panel recent-panel" id="groupListPanel">
        <div class="section-heading">
          <p class="eyebrow">紀錄</p>
          <h2 id="groupListTitle">團購列表</h2>
        </div>
        <div class="order-tabs merchant-only" id="merchantOrderTabs">
          <button class="order-tab is-active" type="button" data-order-list="active">進行中</button>
          <button class="order-tab" type="button" data-order-list="history">歷史訂單</button>
        </div>
        <div class="group-list" id="groupList"></div>
      </section>
      </section>
      </main>
      <div class="phone-home-indicator" aria-hidden="true"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
